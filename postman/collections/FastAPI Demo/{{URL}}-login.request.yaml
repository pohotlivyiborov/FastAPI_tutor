$kind: http-request
name: "{{URL}}/login"
url: "{{URL}}/login"
method: POST
body:
  type: formdata
  content:
    - type: text
      key: username
      value: user@example.com
      description: ""
      disabled: false
    - type: text
      key: password
      value: password123
      description: ""
      disabled: false
auth:
  type: bearer
  credentials:
    token: "{{JWT}}"
scripts:
  - type: afterResponse
    code: pm.environment.set("JWT", pm.response.json().access_token);
    language: text/javascript
